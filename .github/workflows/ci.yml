name: CI

# Continuous integration: runs on every PR and on pushes to the main branch.
# Gates merges on typecheck + lint + build + the full Playwright e2e suite.
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (client)
        run: npx tsc -b

      - name: Typecheck (server)
        run: npm run typecheck:server

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
