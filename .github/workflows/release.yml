name: Release

# Cuts a release when a semver tag is pushed (e.g. v1.2.0).
#
#   git tag v1.2.0 && git push origin v1.2.0
#
# Builds the frontend, typechecks, runs the e2e suite, packages a deployable
# artifact, and publishes a GitHub Release with the tarball + checksum attached.
# The Mac deploy tool (`infra/daybook deploy`) then pulls that artifact.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write # required to create the GitHub Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish Release
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so package-release.sh can `git describe`

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (server)
        run: npm run typecheck:server

      - name: Build frontend
        run: npm run build

      # Gate the release on the e2e suite — never ship a red build.
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package release artifact
        id: package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: bash scripts/package-release.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Daybook ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist-release/daybook-${{ steps.version.outputs.version }}.tar.gz
            dist-release/daybook-${{ steps.version.outputs.version }}.tar.gz.sha256
